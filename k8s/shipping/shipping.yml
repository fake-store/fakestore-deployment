---
apiVersion: v1
kind: ConfigMap
metadata:
  name: shipping-config
  namespace: fakestore
data:
  KAFKA__BOOTSTRAPSERVERS: "kafka-0.kafka.fakestore.svc.cluster.local:9092"
  ASPNETCORE_ENVIRONMENT: "Production"
  ASPNETCORE_URLS: "http://+:8080"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shipping
  namespace: fakestore
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shipping
  template:
    metadata:
      labels:
        app: shipping
    spec:
      containers:
        - name: shipping
          image: ghcr.io/fake-store/fakestore-shipping:${SHIPPING_TAG}
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: shipping-config
            - secretRef:
                name: shipping-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
---
apiVersion: v1
kind: Service
metadata:
  name: shipping-service
  namespace: fakestore
spec:
  selector:
    app: shipping
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
