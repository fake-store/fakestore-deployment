---
- name: Cluster diagnostics
  hosts: pis
  gather_facts: yes
  become: yes
  vars:
    cluster_tmp_dir: "{{ playbook_dir }}/tmp"
  tasks:
    - name: Ensure local tmp directory exists
      delegate_to: localhost
      become: false
      run_once: true
      file:
        path: "{{ cluster_tmp_dir }}"
        state: directory
        mode: '0750'

    - name: Ensure local per-host tmp directory exists
      delegate_to: localhost
      become: false
      file:
        path: "{{ cluster_tmp_dir }}/{{ inventory_hostname }}"
        state: directory
        mode: '0750'

    - name: Check kubelet status
      command: systemctl is-active kubelet
      register: kubelet_status
      ignore_errors: yes

    - name: Check containerd status
      command: systemctl is-active containerd
      register: containerd_status
      ignore_errors: yes

    - name: Check k3s service status
      command: systemctl is-active k3s
      register: k3s_status
      ignore_errors: yes
      changed_when: false

    - name: Check node ready condition (control plane only)
      when: hostvars[inventory_hostname].get('role', '') == 'server'
      become_user: root
      shell: |
        kubectl get nodes --no-headers | awk '{print $2}' | grep -q "Ready" && echo ready || echo not-ready
      register: node_ready
      failed_when: false
      changed_when: false

    - name: Collect logs
      shell: |
        mkdir -p /tmp/diag && journalctl -u k3s --no-pager | tail -n 200 > /tmp/diag/k3s.log || true
      ignore_errors: yes

    - name: Fetch k3s log to local tmp
      fetch:
        src: /tmp/diag/k3s.log
        dest: "{{ cluster_tmp_dir }}/{{ inventory_hostname }}/k3s.log"
        flat: yes
      ignore_errors: yes
      changed_when: false

    - name: Fetch admin kubeconfig from server
      when: hostvars[inventory_hostname].get('role', '') == 'server'
      fetch:
        src: /etc/rancher/k3s/k3s.yaml
        dest: "{{ cluster_tmp_dir }}/kubeconfig-{{ inventory_hostname }}"
        flat: yes
      ignore_errors: yes

    - name: Show summary
      debug:
        msg: |
          Host: {{ inventory_hostname }}
          Kubelet: {{ kubelet_status.stdout | default('unknown') }}
          Containerd: {{ containerd_status.stdout | default('unknown') }}
          k3s: {{ k3s_status.stdout | default('unknown') }}
