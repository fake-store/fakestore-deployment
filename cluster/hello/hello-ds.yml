apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: hello-node
  namespace: default
spec:
  selector:
    matchLabels:
      app: hello-node
  template:
    metadata:
      labels:
        app: hello-node
    spec:
      containers:
      - name: hello
        image: busybox:1.36.1
        command:
          - sh
          - -c
          - |
            mkdir -p /www
            echo "hello from $(NODE_NAME)" > /www/index.html
            # start simple httpd from busybox (foreground)
            httpd -f -p 5678 -h /www
        env:
          - name: NODE_NAME
            valueFrom:
              fieldRef:
                fieldPath: spec.nodeName
        ports:
          - containerPort: 5678
      hostNetwork: true
      tolerations:
        - operator: "Exists"
