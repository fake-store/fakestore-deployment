---
- name: Cluster setup - common prerequisites for all nodes
  hosts: pis
  become: yes
  gather_facts: yes
  vars:
    k3s_version: "v1.29.0+k3s1"
    k3s_install_url: "https://get.k3s.io"
    cluster_tmp_dir: "{{ playbook_dir }}/tmp"
  tasks:
    - name: Ensure local tmp directory exists
      delegate_to: localhost
      become: false
      run_once: true
      file:
        path: "{{ cluster_tmp_dir }}"
        state: directory
        mode: '0750'

    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install common packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - iptables
          - curl
          - gnupg
          - lsb-release
        state: present

    - name: Disable swap
      command: swapoff -a
      ignore_errors: yes

    - name: Remove swap packages if present
      apt:
        name:
          - rpi-swap
          - systemd-zram-generator
        state: absent
      ignore_errors: yes

    - name: Remove swap from fstab
      replace:
        path: /etc/fstab
        regexp: '(^.*\sswap\s.*$)'
        replace: ''
      ignore_errors: yes

    - name: Ensure kernel modules load on boot
      copy:
        content: |
          overlay
          br_netfilter
        dest: /etc/modules-load.d/k8s.conf

    - name: Load kernel modules now
      modprobe:
        name: "{{ item }}"
      loop:
        - overlay
        - br_netfilter

    - name: Set sysctl params for Kubernetes networking
      sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        sysctl_file: /etc/sysctl.d/k8s.conf
        reload: yes
      loop:
        - { key: 'net.bridge.bridge-nf-call-iptables', value: '1' }
        - { key: 'net.bridge.bridge-nf-call-ip6tables', value: '1' }
        - { key: 'net.ipv4.ip_forward', value: '1' }

    - name: Install containerd
      apt:
        name: containerd
        state: present

    - name: Create containerd config directory
      file:
        path: /etc/containerd
        state: directory

    - name: Generate default containerd config
      command: containerd config default > /etc/containerd/config.toml
      args:
        creates: /etc/containerd/config.toml

    - name: Enable SystemdCgroup in containerd
      replace:
        path: /etc/containerd/config.toml
        regexp: 'SystemdCgroup = false'
        replace: '            SystemdCgroup = true'
      notify: Restart containerd

    - name: Ensure containerd is enabled and running
      service:
        name: containerd
        state: started
        enabled: yes

  handlers:
    - name: Restart containerd
      service:
        name: containerd
        state: restarted
        enabled: yes

- name: Cluster setup - install and initialize k3s server(s)
  hosts: pi1
  become: yes
  vars:
    k3s_version: "v1.29.0+k3s1"
    k3s_install_url: "https://get.k3s.io"
    cluster_tmp_dir: "{{ playbook_dir }}/tmp"
  gather_facts: yes
  tasks:
    - name: Ensure local per-host tmp directory exists
      delegate_to: localhost
      become: false
      run_once: true
      file:
        path: "{{ cluster_tmp_dir }}/{{ inventory_hostname }}"
        state: directory
        mode: '0750'

    - name: Ensure iptables tools are installed (needed by k3s)
      apt:
        name:
          - iptables
        state: present
        update_cache: yes

    - name: Ensure memory cgroup is enabled on the Pi cmdline
      shell: |
        CMDLINE=""
        if [ -f /boot/firmware/cmdline.txt ]; then
          CMDLINE=/boot/firmware/cmdline.txt
        elif [ -f /boot/cmdline.txt ]; then
          CMDLINE=/boot/cmdline.txt
        fi
        if [ -z "$CMDLINE" ]; then
          echo "nofile"
        else
          if grep -q 'cgroup_memory=1' "$CMDLINE"; then
            echo nochange
          else
            sed -i '1 s/$/ cgroup_memory=1 cgroup_enable=memory/' "$CMDLINE"
            echo changed
          fi
        fi
      register: cmdline_change

    - name: Reboot Pi if cmdline was modified to enable memory cgroup
      when: "'changed' in cmdline_change.stdout"
      reboot:
        reboot_timeout: 300
        test_command: whoami

    - name: Update apt cache on server after reboot (ensure packages available)
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install k3s server
      shell: |
        curl -sfL {{ k3s_install_url }} | INSTALL_K3S_VERSION={{ k3s_version }} sh -s server --write-kubeconfig-mode 644
      args:
        creates: /usr/local/bin/k3s

    - name: Check k3s service status
      shell: systemctl is-active k3s || true
      register: k3s_status
      changed_when: false

    - name: Collect k3s journal if service failed
      shell: journalctl -xeu k3s.service --no-pager | tail -n 200
      register: k3s_journal
      when: k3s_status.stdout.strip() != 'active'
      changed_when: false

    - name: Save k3s journal to local tmp when service failed
      when: k3s_status.stdout.strip() != 'active'
      delegate_to: localhost
      copy:
        content: "{{ k3s_journal.stdout }}"
        dest: "{{ cluster_tmp_dir }}/{{ inventory_hostname }}/k3s-journal.txt"
      ignore_errors: yes

    - name: Fail if k3s did not start
      fail:
        msg: "k3s failed to start on server. See journal output: {{ k3s_journal.stdout }}"
      when: k3s_status.stdout.strip() != 'active'

    - name: Wait for Kubernetes API
      become_user: root
      shell: |
        kubectl wait --for=condition=Available --timeout=120s deployment/kube-apiserver -n kube-system 2>/dev/null || true
      register: wait_api
      failed_when: false

    - name: Wait for k3s node-token to exist
      wait_for:
        path: /var/lib/rancher/k3s/server/node-token
        timeout: 120
        state: present

    - name: Get join token for k3s
      shell: cat /var/lib/rancher/k3s/server/node-token
      register: k3s_token
      changed_when: false

    - name: Publish join info as k3s_master host
      add_host:
        name: k3s_master
        groups: k3s_meta
        k3s_server_url: "https://{{ hostvars[inventory_hostname].get('ansible_host', ansible_default_ipv4.address) }}:6443"
        k3s_token: "{{ k3s_token.stdout }}"

- name: Cluster setup - join workers to k3s server
  hosts: pis
  become: yes
  vars:
    k3s_version: "v1.29.0+k3s1"
    k3s_install_url: "https://get.k3s.io"
    cluster_tmp_dir: "{{ playbook_dir }}/tmp"
  gather_facts: yes
  tasks:
    - name: Wait for server facts to be available
      pause:
        seconds: 5
      when: hostvars[inventory_hostname].get('role', '') == 'worker'

    - name: Find the server host
      when: hostvars[inventory_hostname].get('role', '') == 'worker'
      set_fact:
        the_server: "{{ hostvars['k3s_master'] }}"

    - name: Debug server info
      when: hostvars[inventory_hostname].get('role', '') == 'worker'
      debug:
        msg: "Server URL: {{ the_server.k3s_server_url }} token present: {{ the_server.k3s_token is defined }}"

    - name: Ensure memory cgroup is enabled on worker cmdline
      when: hostvars[inventory_hostname].get('role', '') == 'worker'
      shell: |
        CMDLINE=""
        if [ -f /boot/firmware/cmdline.txt ]; then
          CMDLINE=/boot/firmware/cmdline.txt
        elif [ -f /boot/cmdline.txt ]; then
          CMDLINE=/boot/cmdline.txt
        fi
        if [ -z "$CMDLINE" ]; then
          echo "nofile"
        else
          if grep -q 'cgroup_memory=1' "$CMDLINE"; then
            echo nochange
          else
            sed -i '1 s/$/ cgroup_memory=1 cgroup_enable=memory/' "$CMDLINE"
            echo changed
          fi
        fi
      register: cmdline_change_worker

    - name: Reboot worker if cmdline was modified to enable memory cgroup
      when: hostvars[inventory_hostname].get('role', '') == 'worker' and "'changed' in cmdline_change_worker.stdout"
      reboot:
        reboot_timeout: 600
        pre_reboot_delay: 2
        post_reboot_delay: 10
        test_command: whoami
      register: reboot_result
      failed_when: false

    - name: Wait for worker SSH after reboot
      when: hostvars[inventory_hostname].get('role', '') == 'worker' and "'changed' in cmdline_change_worker.stdout"
      wait_for_connection:
        timeout: 600
        delay: 5
      register: wait_conn_result

    - name: Fail if worker did not come back after reboot
      when: hostvars[inventory_hostname].get('role', '') == 'worker' and "'changed' in cmdline_change_worker.stdout" and (wait_conn_result is not defined or wait_conn_result is failed)
      fail:
        msg: "Host {{ inventory_hostname }} ({{ ansible_host | default(inventory_hostname) }}) did not become reachable over SSH after reboot; check network and power. Collected diagnostics are under {{ cluster_tmp_dir }}/{{ inventory_hostname }} or run the diag playbook."

    - name: Update apt cache on worker after reboot
      when: hostvars[inventory_hostname].get('role', '') == 'worker'
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install k3s agent on workers
      when: hostvars[inventory_hostname].get('role', '') == 'worker'
      shell: |
        curl -sfL {{ k3s_install_url }} | K3S_URL={{ the_server.k3s_server_url }} K3S_TOKEN={{ the_server.k3s_token }} INSTALL_K3S_VERSION={{ k3s_version }} sh -s agent
      args:
        creates: /var/lib/rancher/k3s/agent

