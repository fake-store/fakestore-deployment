# Snippet for service repo build workflows
# ─────────────────────────────────────────────────────────────────────────────
# Add these two steps to .github/workflows/build.yml in each service repo,
# AFTER the docker push step.
#
# Replace SERVICE_NAME with the actual service name:
#   payments | users | website | orders | shipping | notifications
#
# Auth: uses a GitHub App installed on fake-store/deployment.
#   Secrets APP_ID and APP_PRIVATE_KEY are stored at the org level and
#   are automatically available in all service repos — no per-repo setup.
#
# actions/create-github-app-token is published by github.com/actions (GitHub).
# ─────────────────────────────────────────────────────────────────────────────

      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: deployment

      - name: Trigger deployment manifest update
        if: github.ref == 'refs/heads/main'
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          curl -sS --fail-with-body \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ steps.app-token.outputs.token }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/fake-store/deployment/actions/workflows/new-release.yml/dispatches \
            -d "{\"ref\":\"main\",\"inputs\":{\"service\":\"SERVICE_NAME\",\"tag\":\"sha-${SHORT_SHA}\"}}"
