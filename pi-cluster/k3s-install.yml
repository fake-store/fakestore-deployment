---
# ── Play 1: Common prerequisites for all nodes ────────────────────────────────
- name: Cluster setup - common prerequisites
  hosts: pis
  become: yes
  gather_facts: yes
  vars:
    k3s_version: "v1.29.0+k3s1"
    k3s_install_url: "https://get.k3s.io"
    cluster_tmp_dir: "{{ playbook_dir }}/.log"
  tasks:
    - name: Ensure local tmp directory exists
      delegate_to: localhost
      become: false
      run_once: true
      file:
        path: "{{ cluster_tmp_dir }}"
        state: directory
        mode: '0750'

    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install common packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - iptables
          - curl
          - gnupg
          - lsb-release
        state: present

    - name: Disable swap
      command: swapoff -a
      ignore_errors: yes

    - name: Remove swap packages if present
      apt:
        name:
          - rpi-swap
          - systemd-zram-generator
        state: absent
      ignore_errors: yes

    - name: Remove swap from fstab
      replace:
        path: /etc/fstab
        regexp: '(^.*\sswap\s.*$)'
        replace: ''
      ignore_errors: yes

    - name: Ensure kernel modules load on boot
      copy:
        content: |
          overlay
          br_netfilter
        dest: /etc/modules-load.d/k8s.conf

    - name: Load kernel modules now
      modprobe:
        name: "{{ item }}"
      loop:
        - overlay
        - br_netfilter

    - name: Set sysctl params for Kubernetes networking
      sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        sysctl_file: /etc/sysctl.d/k8s.conf
        reload: yes
      loop:
        - { key: 'net.bridge.bridge-nf-call-iptables', value: '1' }
        - { key: 'net.bridge.bridge-nf-call-ip6tables', value: '1' }
        - { key: 'net.ipv4.ip_forward', value: '1' }

    - name: Install containerd
      apt:
        name: containerd
        state: present

    - name: Create containerd config directory
      file:
        path: /etc/containerd
        state: directory

    - name: Generate default containerd config
      command: containerd config default > /etc/containerd/config.toml
      args:
        creates: /etc/containerd/config.toml

    - name: Enable SystemdCgroup in containerd
      replace:
        path: /etc/containerd/config.toml
        regexp: 'SystemdCgroup = false'
        replace: '            SystemdCgroup = true'
      notify: Restart containerd

    - name: Ensure containerd is enabled and running
      service:
        name: containerd
        state: started
        enabled: yes

  handlers:
    - name: Restart containerd
      service:
        name: containerd
        state: restarted
        enabled: yes

# ── Play 2: Install k3s server on pi3 ────────────────────────────────────────
- name: Cluster setup - install and initialize k3s server
  hosts: pi3
  become: yes
  gather_facts: yes
  vars:
    k3s_version: "v1.29.0+k3s1"
    k3s_install_url: "https://get.k3s.io"
    cluster_tmp_dir: "{{ playbook_dir }}/.log"
  tasks:
    - name: Ensure local per-host tmp directory exists
      delegate_to: localhost
      become: false
      run_once: true
      file:
        path: "{{ cluster_tmp_dir }}/{{ inventory_hostname }}"
        state: directory
        mode: '0750'

    - name: Ensure iptables tools are installed
      apt:
        name: iptables
        state: present
        update_cache: yes

    - name: Ensure memory cgroup is enabled on the Pi cmdline
      shell: |
        CMDLINE=""
        if [ -f /boot/firmware/cmdline.txt ]; then
          CMDLINE=/boot/firmware/cmdline.txt
        elif [ -f /boot/cmdline.txt ]; then
          CMDLINE=/boot/cmdline.txt
        fi
        if [ -z "$CMDLINE" ]; then
          echo "nofile"
        else
          if grep -q 'cgroup_memory=1' "$CMDLINE"; then
            echo nochange
          else
            sed -i '1 s/$/ cgroup_memory=1 cgroup_enable=memory/' "$CMDLINE"
            echo changed
          fi
        fi
      register: cmdline_change

    - name: Reboot if cmdline was modified
      when: "'changed' in cmdline_change.stdout"
      reboot:
        reboot_timeout: 300
        test_command: whoami

    - name: Update apt cache after reboot
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install k3s server
      shell: |
        curl -sfL {{ k3s_install_url }} | INSTALL_K3S_VERSION={{ k3s_version }} sh -s server --write-kubeconfig-mode 644
      args:
        creates: /usr/local/bin/k3s

    - name: Check k3s service status
      shell: systemctl is-active k3s || true
      register: k3s_status
      changed_when: false

    - name: Collect k3s journal if service failed
      shell: journalctl -xeu k3s.service --no-pager | tail -n 200
      register: k3s_journal
      when: k3s_status.stdout.strip() != 'active'
      changed_when: false

    - name: Save k3s journal to local tmp when service failed
      when: k3s_status.stdout.strip() != 'active'
      delegate_to: localhost
      copy:
        content: "{{ k3s_journal.stdout }}"
        dest: "{{ cluster_tmp_dir }}/{{ inventory_hostname }}/k3s-journal.txt"
      ignore_errors: yes

    - name: Fail if k3s did not start
      fail:
        msg: "k3s failed to start. See: {{ cluster_tmp_dir }}/{{ inventory_hostname }}/k3s-journal.txt"
      when: k3s_status.stdout.strip() != 'active'

    - name: Wait for k3s node-token to exist
      wait_for:
        path: /var/lib/rancher/k3s/server/node-token
        timeout: 120
        state: present

    - name: Get join token
      shell: cat /var/lib/rancher/k3s/server/node-token
      register: k3s_token
      changed_when: false

    - name: Publish join info for workers
      add_host:
        name: k3s_master
        groups: k3s_meta
        k3s_server_url: "https://{{ hostvars[inventory_hostname].get('ansible_host', ansible_default_ipv4.address) }}:6443"
        k3s_token: "{{ k3s_token.stdout }}"

# ── Play 3: Join workers ──────────────────────────────────────────────────────
- name: Cluster setup - join workers
  hosts: pis
  become: yes
  gather_facts: yes
  vars:
    k3s_version: "v1.29.0+k3s1"
    k3s_install_url: "https://get.k3s.io"
    cluster_tmp_dir: "{{ playbook_dir }}/.log"
  tasks:
    - name: Find the server host
      when: hostvars[inventory_hostname].get('role', '') == 'worker'
      set_fact:
        the_server: "{{ hostvars['k3s_master'] }}"

    - name: Ensure memory cgroup is enabled on worker cmdline
      when: hostvars[inventory_hostname].get('role', '') == 'worker'
      shell: |
        CMDLINE=""
        if [ -f /boot/firmware/cmdline.txt ]; then
          CMDLINE=/boot/firmware/cmdline.txt
        elif [ -f /boot/cmdline.txt ]; then
          CMDLINE=/boot/cmdline.txt
        fi
        if [ -z "$CMDLINE" ]; then
          echo "nofile"
        else
          if grep -q 'cgroup_memory=1' "$CMDLINE"; then
            echo nochange
          else
            sed -i '1 s/$/ cgroup_memory=1 cgroup_enable=memory/' "$CMDLINE"
            echo changed
          fi
        fi
      register: cmdline_change_worker

    - name: Reboot worker if cmdline was modified
      when: hostvars[inventory_hostname].get('role', '') == 'worker' and "'changed' in cmdline_change_worker.stdout"
      reboot:
        reboot_timeout: 600
        pre_reboot_delay: 2
        post_reboot_delay: 10
        test_command: whoami
      register: reboot_result
      failed_when: false

    - name: Wait for worker SSH after reboot
      when: hostvars[inventory_hostname].get('role', '') == 'worker' and "'changed' in cmdline_change_worker.stdout"
      wait_for_connection:
        timeout: 600
        delay: 5

    - name: Update apt cache on worker after reboot
      when: hostvars[inventory_hostname].get('role', '') == 'worker'
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install k3s agent on workers
      when: hostvars[inventory_hostname].get('role', '') == 'worker'
      shell: |
        curl -sfL {{ k3s_install_url }} | K3S_URL={{ the_server.k3s_server_url }} K3S_TOKEN={{ the_server.k3s_token }} INSTALL_K3S_VERSION={{ k3s_version }} sh -s agent
      args:
        creates: /var/lib/rancher/k3s/agent

# ── Play 4: Configure SATA storage on pi3 ────────────────────────────────────
- name: Cluster setup - configure SATA storage
  hosts: pi3
  become: yes
  gather_facts: yes
  vars:
    sata_device: /dev/sda1
    mount_point: /mnt/sata
    postgres_uid: 999
    postgres_gid: 999
  tasks:
    - name: Install e2fsprogs
      apt:
        name: e2fsprogs
        state: present
        update_cache: yes

    - name: Check if SATA device exists
      stat:
        path: "{{ sata_device }}"
      register: sata_dev

    - name: Fail if SATA device not found
      fail:
        msg: "SATA device {{ sata_device }} not found. Check drive is connected."
      when: not sata_dev.stat.exists

    - name: Check if device already has a filesystem
      command: blkid -s TYPE -o value {{ sata_device }}
      register: existing_fs
      changed_when: false
      failed_when: false

    - name: Format as ext4 if no filesystem present
      command: mkfs.ext4 -L fakestore-data {{ sata_device }}
      when: existing_fs.stdout == ""

    - name: Ensure mount point exists
      file:
        path: "{{ mount_point }}"
        state: directory
        mode: '0755'

    - name: Get device UUID
      command: blkid -s UUID -o value {{ sata_device }}
      register: device_uuid
      changed_when: false

    - name: Add fstab entry for persistent mount
      lineinfile:
        path: /etc/fstab
        line: "UUID={{ device_uuid.stdout }} {{ mount_point }} ext4 defaults,noatime 0 2"
        regexp: "^UUID={{ device_uuid.stdout }}"
        state: present

    - name: Mount the drive
      mount:
        path: "{{ mount_point }}"
        src: "UUID={{ device_uuid.stdout }}"
        fstype: ext4
        opts: defaults,noatime
        state: mounted

    - name: Create postgres data directory
      file:
        path: "{{ mount_point }}/data/postgres"
        state: directory
        owner: "{{ postgres_uid }}"
        group: "{{ postgres_gid }}"
        mode: '0750'

    - name: Create catalog images directory
      file:
        path: "{{ mount_point }}/data/catalog-images"
        state: directory
        mode: '0755'
