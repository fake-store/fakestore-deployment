services:

  # ── Infrastructure ────────────────────────────────────────────────────────

  postgres:
    image: postgres:17
    container_name: fakestore-postgres
    restart: always
    environment:
      POSTGRES_DB: fakestore_users
      POSTGRES_USER: fakestore_admin
      POSTGRES_PASSWORD: ${PG_ADMIN_PASSWORD}
      POSTGRES_USERS_ADMIN_PASSWORD: ${USERS_DB_ADMIN_PASSWORD}
      POSTGRES_USERS_DATA_PASSWORD: ${USERS_DB_PASSWORD}
      POSTGRES_ORDERS_ADMIN_PASSWORD: ${ORDERS_DB_ADMIN_PASSWORD}
      POSTGRES_ORDERS_DATA_PASSWORD: ${ORDERS_DB_PASSWORD}
      POSTGRES_CATALOG_ADMIN_PASSWORD: ${CATALOG_DB_ADMIN_PASSWORD}
      POSTGRES_CATALOG_DATA_PASSWORD: ${CATALOG_DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-init.sh:/docker-entrypoint-initdb.d/init.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fakestore_admin -d fakestore_users"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:3.7.1
    container_name: fakestore-kafka
    restart: always
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://:9092,EXTERNAL://:9091,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9091
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_HEAP_OPTS: "-Xmx200m -Xms128m"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
      interval: 15s
      timeout: 15s
      retries: 15
      start_period: 60s

  # ── Services ──────────────────────────────────────────────────────────────
  #
  # All service-to-service HTTP URLs use container names.
  # No ports are exposed to the host except website:8080 (nginx proxies to it).

  users:
    image: ghcr.io/fake-store/fakestore-users:${USERS_TAG}
    container_name: fakestore-users
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: ""
      DB_HOST: postgres
      DB_USER: fakestore_users_user
      DB_PASSWORD: ${USERS_DB_PASSWORD}
      DB_ADMIN_USER: fakestore_users_admin
      DB_ADMIN_PASSWORD: ${USERS_DB_ADMIN_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JAVA_TOOL_OPTIONS: "-Xmx200m"

  payments:
    image: ghcr.io/fake-store/fakestore-payments:${PAYMENTS_TAG}
    container_name: fakestore-payments
    restart: always
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: ""
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: ${JWT_SECRET}
      JAVA_TOOL_OPTIONS: "-Xmx200m"

  orders:
    image: ghcr.io/fake-store/fakestore-orders:${ORDERS_TAG}
    container_name: fakestore-orders
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: ""
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      DB_HOST: postgres
      DB_NAME: fakestore_orders
      DB_USER: fakestore_orders_user
      DB_PASSWORD: ${ORDERS_DB_PASSWORD}
      DB_ADMIN_USER: fakestore_orders_admin
      DB_ADMIN_PASSWORD: ${ORDERS_DB_ADMIN_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JAVA_TOOL_OPTIONS: "-Xmx200m"

  shipping:
    image: ghcr.io/fake-store/fakestore-shipping:${SHIPPING_TAG}
    container_name: fakestore-shipping
    restart: always
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: http://+:8080
      KAFKA__BOOTSTRAPSERVERS: kafka:9092
      JWT__SECRET: ${JWT_SECRET}

  catalog:
    image: ghcr.io/fake-store/fakestore-catalog:${CATALOG_TAG}
    container_name: fakestore-catalog
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 8080
      DB_HOST: postgres
      DB_NAME: fakestore_catalog
      DB_USER: fakestore_catalog_app
      DB_PASSWORD: ${CATALOG_DB_PASSWORD}
      DB_ADMIN_USER: fakestore_catalog_admin
      DB_ADMIN_PASSWORD: ${CATALOG_DB_ADMIN_PASSWORD}
    volumes:
      - catalog-images:/app/images

  # notifications excluded — image is ARM64-only (built for pi cluster)
  # add back once CI builds multi-arch

  website:
    image: ghcr.io/fake-store/fakestore-website:${WEBSITE_TAG}
    container_name: fakestore-website
    restart: always
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      - users
      - payments
      - orders
      - shipping
      - catalog
    environment:
      SPRING_PROFILES_ACTIVE: ""
      USERS_SERVICE_URL: http://users:8080
      PAYMENTS_SERVICE_URL: http://payments:8080
      ORDERS_SERVICE_URL: http://orders:8080
      SHIPPING_SERVICE_URL: http://shipping:8080
      CATALOG_SERVICE_URL: http://catalog:8080
      JWT_SECRET: ${JWT_SECRET}
      JAVA_TOOL_OPTIONS: "-Xmx256m"

volumes:
  postgres-data:
  kafka-data:
  catalog-images:
