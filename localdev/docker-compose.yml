services:

  # ── Infrastructure ────────────────────────────────────────────────────────

  postgres:
    image: postgres:16
    container_name: fakestore-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: fakestore_users
      POSTGRES_USER: fakestore_admin
      POSTGRES_PASSWORD: ${PG_ADMIN_PASSWORD}
      POSTGRES_USERS_ADMIN_PASSWORD: ${USERS_DB_ADMIN_PASSWORD}
      POSTGRES_USERS_DATA_PASSWORD: ${USERS_DB_PASSWORD}
      POSTGRES_ORDERS_ADMIN_PASSWORD: ${ORDERS_DB_ADMIN_PASSWORD}
      POSTGRES_ORDERS_DATA_PASSWORD: ${ORDERS_DB_PASSWORD}
      POSTGRES_CATALOG_ADMIN_PASSWORD: ${CATALOG_DB_ADMIN_PASSWORD}
      POSTGRES_CATALOG_DATA_PASSWORD: ${CATALOG_DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-init.sh:/docker-entrypoint-initdb.d/init.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fakestore_admin -d fakestore_users"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:3.7.1
    container_name: fakestore-kafka
    ports:
      - "9091:9091"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://:9092,EXTERNAL://:9091,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9091
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9091 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 15s

  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    container_name: fakestore-kafka-ui
    ports:
      - "9094:8080"
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  # ── Services ──────────────────────────────────────────────────────────────
  #
  # All service-to-service HTTP URLs use host.docker.internal so that stopping
  # a container and running it in your IDE works without any reconfiguration.
  # Each service container listens on 8080 internally, mapped to its assigned
  # host port (matching the local dev port scheme in application-local.properties).
  #
  # Port scheme:
  #   8080 = website
  #   8081 = users
  #   8082 = payments
  #   8083 = orders
  #   8084 = shipping
  #   8085 = catalog

  users:
    image: ghcr.io/fake-store/fakestore-users:latest

    container_name: fakestore-users
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: ""
      DB_HOST: postgres
      DB_USER: fakestore_users_user
      DB_PASSWORD: ${USERS_DB_PASSWORD}
      DB_ADMIN_USER: fakestore_users_admin
      DB_ADMIN_PASSWORD: ${USERS_DB_ADMIN_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}

  payments:
    image: ghcr.io/fake-store/fakestore-payments:latest

    container_name: fakestore-payments
    ports:
      - "8082:8080"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: ""
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: ${JWT_SECRET}

  orders:
    image: ghcr.io/fake-store/fakestore-orders:latest

    container_name: fakestore-orders
    ports:
      - "8083:8080"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: ""
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      DB_HOST: postgres
      DB_NAME: fakestore_orders
      DB_USER: fakestore_orders_user
      DB_PASSWORD: ${ORDERS_DB_PASSWORD}
      DB_ADMIN_USER: fakestore_orders_admin
      DB_ADMIN_PASSWORD: ${ORDERS_DB_ADMIN_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}

  shipping:
    image: ghcr.io/fake-store/fakestore-shipping:latest

    container_name: fakestore-shipping
    ports:
      - "8084:8080"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: http://+:8080
      KAFKA__BOOTSTRAPSERVERS: kafka:9092
      JWT__SECRET: ${JWT_SECRET}

  catalog:
    image: ghcr.io/fake-store/fakestore-catalog:latest

    container_name: fakestore-catalog
    ports:
      - "8085:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 8080
      DB_HOST: postgres
      DB_NAME: fakestore_catalog
      DB_USER: fakestore_catalog_app
      DB_PASSWORD: ${CATALOG_DB_PASSWORD}
      DB_ADMIN_USER: fakestore_catalog_admin
      DB_ADMIN_PASSWORD: ${CATALOG_DB_ADMIN_PASSWORD}
    volumes:
      - catalog-images:/app/images

  website:
    image: ghcr.io/fake-store/fakestore-website:latest

    container_name: fakestore-website
    ports:
      - "80:8080"
    depends_on:
      - users
      - payments
      - orders
      - shipping
      - catalog
    environment:
      SPRING_PROFILES_ACTIVE: ""
      USERS_SERVICE_URL: http://host.docker.internal:8081
      PAYMENTS_SERVICE_URL: http://host.docker.internal:8082
      ORDERS_SERVICE_URL: http://host.docker.internal:8083
      SHIPPING_SERVICE_URL: http://host.docker.internal:8084
      CATALOG_SERVICE_URL: http://host.docker.internal:8085
      JWT_SECRET: ${JWT_SECRET}

volumes:
  postgres-data:
  catalog-images:
